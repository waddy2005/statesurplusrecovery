name: Build and Deploy to SiteGround

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build for production
        run: npm run build
        env:
          CI: true

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/logo.png
          test -d dist/assets
          ls -la dist/

      - name: Install lftp
        run: sudo apt-get update -y && sudo apt-get install -y lftp

      - name: Deploy to SiteGround via SFTP
        env:
          SFTP_SERVER: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SFTP_PASS: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: ${{ vars.FTP_PORT || '18765' }}
          SFTP_DIR: ${{ vars.FTP_SERVER_DIR || '/public_html/' }}
        run: |
          set -e
          echo "Connecting to $SFTP_SERVER on port $SFTP_PORT..."
          lftp -c "
            set sftp:auto-confirm yes;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set net:timeout 30;
            set mirror:use-pget-n 4;
            open -p $SFTP_PORT -u '$SFTP_USER','$SFTP_PASS' sftp://$SFTP_SERVER;
            mirror --reverse --verbose --parallel=4 --no-perms --exclude '\\.git.*' --exclude 'node_modules/' ./dist/ '$SFTP_DIR';
            bye;
          "
          echo "✅ Upload complete"

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deploy complete"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
