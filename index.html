      {
        "@context": "https://schema.org",
        "@type": "LegalService",
        "name": "State Surplus Recovery",
        "description": "Surplus funds recovery for homeowners and heirs after foreclosure and tax sale auctions. Contingency-based, no upfront fees.",
        "url": "https://statesurplusrecovery.com",
        "logo": "https://statesurplusrecovery.com/logo.png",
        "image": "https://statesurplusrecovery.com/logo.png",
        "telephone": "+1-877-600-4919",
        "email": "team@statesurplusrecovery.com",
        "priceRange": "Contingency",
        "areaServed": "United States",
        "founder": {
          "@type": "Person",
          "name": "Lonny Mitchell"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday"],
            "opens": "08:00",
            "closes": "18:00"
          }
        ],
        "sameAs": []
      }
    </script>

    <!-- Structured data: FAQPage -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What are surplus funds?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "When a property is sold at a foreclosure or tax sale, the buyer often pays more than what is owed on the home. After the lender or county takes its share, the leftover money is called surplus funds. By law, that money belongs to the former owner."
            }
          },
          {
            "@type": "Question",
            "name": "Do I have to pay anything upfront?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. You pay nothing to get started. Our fee is a percentage of what we recover, taken from the funds when they arrive. If the claim falls through, you do not owe us a dollar."
            }
          },
          {
            "@type": "Question",
            "name": "How long does the process take?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The process typically takes 90 to 180 days depending on the state and county regulations. Some counties move faster. A few require court hearings that push timelines out."
            }
          },
          {
            "@type": "Question",
            "name": "Is this a scam?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "It is a fair question. State Surplus Recovery is a registered, licensed, and bonded recovery firm. We never ask for money up front, and every fee is in writing before any paperwork is filed."
            }
          }
        ]
      }
    </script>
